<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GCC Pharma BD Tracker</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --bg:#ffffff;--bg2:#f7f7f5;--bg3:#f0efec;
  --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.18);
  --text:#1a1a1a;--text2:#555;--text3:#999;
  --blue-bg:#e6f1fb;--blue-text:#0c447c;
  --green-bg:#eaf3de;--green-text:#27500a;
  --amber-bg:#faeeda;--amber-text:#61410b;
  --red-bg:#fdf0ed;--red-text:#7d1212;
  --gray-bg:#f4f4f4;--gray-text:#444;
}

body {
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background-color:var(--bg2);
  color:var(--text);
  line-height:1.4;
  -webkit-font-smoothing:antialiased;
}

#pin-screen {
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  background-color:var(--bg2);
  padding:20px;
}

.pin-box {
  background:var(--bg);
  padding:32px 28px;
  border-radius:12px;
  box-shadow:0 8px 24px rgba(0,0,0,0.06);
  border:1px solid var(--border);
  width:100%;
  max-width:340px;
  text-align:center;
}

.pin-title {
  font-weight:600;
  font-size:18px;
  margin-bottom:6px;
  letter-spacing:-0.01em;
}

.pin-sub {
  font-size:13px;
  color:var(--text2);
  margin-bottom:24px;
}

.pin-input {
  width:100%;
  padding:12px;
  font-size:18px;
  text-align:center;
  letter-spacing:6px;
  border:1px solid var(--border2);
  border-radius:6px;
  margin-bottom:16px;
  background:var(--bg);
  color:var(--text);
}

.pin-btn {
  width:100%;
  padding:12px;
  background:var(--text);
  color:var(--bg);
  border:none;
  border-radius:6px;
  font-weight:500;
  cursor:pointer;
  font-size:14px;
}

.pin-btn:hover {
  opacity:0.9;
}

.pin-err {
  color:var(--red-text);
  background:var(--red-bg);
  padding:8px;
  font-size:12px;
  border-radius:4px;
  margin-top:12px;
  display:none;
}

#app {
  display:none;
}

.header {
  background:var(--bg);
  border-bottom:1px solid var(--border);
  position:sticky;
  top:0;
  z-index:90;
}

.h-top {
  display:flex;
  align-items:center;
  justify-content:between;
  padding:12px 20px;
  border-bottom:1px solid rgba(0,0,0,0.05);
}

.logo-area {
  display:flex;
  align-items:center;
  gap:12px;
}

.logo-mark {
  background:var(--text);
  color:var(--bg);
  font-weight:700;
  font-size:13px;
  width:24px;
  height:24px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:4px;
  letter-spacing:-0.5px;
}

.logo-txt {
  font-weight:600;
  font-size:15px;
  letter-spacing:-0.02em;
}

.sync-status {
  font-size:11px;
  font-weight:500;
  padding:4px 8px;
  border-radius:12px;
  background:var(--bg3);
  color:var(--text2);
}

.sync-ok { background:var(--green-bg); color:var(--green-text); }
.sync-err { background:var(--red-bg); color:var(--red-text); }
.sync-loading { background:var(--blue-bg); color:var(--blue-text); }

.h-nav {
  display:flex;
  align-items:center;
  justify-content:between;
  padding:0 20px;
  height:44px;
}

.nav-tabs {
  display:flex;
  gap:4px;
  height:100%;
  align-items:center;
}

.nav-btn {
  background:none;
  border:none;
  padding:0 12px;
  height:32px;
  font-size:13px;
  font-weight:500;
  color:var(--text2);
  cursor:pointer;
  border-radius:6px;
  display:flex;
  align-items:center;
}

.nav-btn:hover {
  background:var(--bg2);
  color:var(--text);
}

.nav-btn.active {
  background:var(--bg3);
  color:var(--text);
}

.h-actions {
  display:flex;
  gap:8px;
}

.btn {
  background:var(--bg);
  border:1px solid var(--border2);
  color:var(--text);
  padding:6px 12px;
  font-size:13px;
  font-weight:500;
  border-radius:6px;
  cursor:pointer;
  display:inline-flex;
  align-items:center;
  gap:6px;
}

.btn:hover { background:var(--bg2); }
.btn-primary { background:var(--text); color:var(--bg); border-color:var(--text); }
.btn-primary:hover { opacity:0.9; background:var(--text); }
.btn-sm { padding:4px 8px; font-size:12px; border-radius:4px; }
.btn-danger { color:var(--red-text); border-color:rgba(125,18,18,0.2); }
.btn-danger:hover { background:var(--red-bg); }

.main {
  padding:20px;
  max-width:1440px;
  margin:0 auto;
}

.view { display:none; }
.view.active { display:block; }

.fbar {
  background:var(--bg);
  border:1px solid var(--border);
  border-radius:8px;
  padding:12px;
  margin-bottom:16px;
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  align-items:center;
}

.fbar input, .fbar select {
  background:var(--bg);
  border:1px solid var(--border2);
  border-radius:6px;
  padding:6px 10px;
  font-size:13px;
  color:var(--text);
  outline:none;
}

.fbar input:focus, .fbar select:focus {
  border-color:var(--text);
}

.f-search-wrap { flex:1; min-width:200px; }
.f-search-wrap input { width:100%; }

.stats-grid {
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));
  gap:12px;
  margin-bottom:20px;
}

.stat-card {
  background:var(--bg);
  border:1px solid var(--border);
  border-radius:8px;
  padding:14px 16px;
}

.slabel { font-size:12px; color:var(--text2); font-weight:500; margin-bottom:4px; }
.sval { font-size:22px; font-weight:700; letter-spacing:-0.02em; }

.section-head {
  font-size:12px;
  font-weight:600;
  text-transform:uppercase;
  letter-spacing:0.04em;
  color:var(--text2);
  margin:24px 0 10px 0;
  padding-bottom:4px;
  border-bottom:1px solid var(--border);
}

.section-overdue { color:var(--red-text); border-color:rgba(125,18,18,0.15); }
.section-today { color:var(--amber-text); border-color:rgba(97,65,11,0.15); }

.table-scroller {
  overflow-x:auto;
  background:var(--bg);
  border:1px solid var(--border);
  border-radius:8px;
}

.crow {
  display:grid;
  grid-template-columns:30px 220px 200px 160px 1fr 110px;
  padding:12px 16px;
  border-bottom:1px solid var(--border);
  align-items:start;
  gap:12px;
  background:var(--bg);
}

.crow:last-child { border-bottom:none; }
.crow:hover { background:var(--bg2); }

.overdue { border-left:3px solid #db4437; }
.today-row { border-left:3px solid #f4b400; }

.tl-r { color:#db4437; }

.cname { font-weight:600; font-size:13.5px; display:flex; align-items:center; gap:6px; }
.csub { font-size:12px; color:var(--text2); margin-top:2px; }
.badge {
  display:inline-block;
  font-size:10.5px;
  font-weight:600;
  padding:2
